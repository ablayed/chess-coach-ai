version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "7860:7860"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 7860 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:7860
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
